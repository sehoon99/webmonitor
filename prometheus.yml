global:
  scrape_interval: 5s
scrape_configs:
  - job_name: macbook-node
    static_configs:
      - targets:
          - node-exporter:9100
  - job_name: website-latency
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - https://www.google.com
          - https://www.github.com
          - https://www.naver.com
          - https://www.ticketlink.co.kr/home
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
